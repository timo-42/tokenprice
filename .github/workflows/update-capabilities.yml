name: Update model capabilities

on:
  schedule:
    - cron: "43 4 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: model-capabilities-update
  cancel-in-progress: false

jobs:
  update-capabilities:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install package metadata
        run: npm install --package-lock=false --ignore-scripts

      - name: Update capability catalog
        run: npm run update:capabilities

      - name: Run tests
        run: npm test

      - name: Commit changed capability catalog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/model-capabilities.json
          if git diff --cached --quiet; then
            echo "No capability catalog changes to commit."
          else
            git commit -m "Update model capability catalog"
            git push
          fi
